<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plotter — Path Finder</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">
    <div id="backend-status" class="status-bar hidden">
      <div class="status-text"></div>
      <div class="progress-container"><div class="progress-bar"></div></div>
    </div>
    <header>
      <h1>Plotter</h1>
      <button id="theme-toggle" class="icon-btn" title="Toggle dark/light mode">🌓</button>
    </header>
    <main>
      <div class="controls">
        <div class="row">
          <label>Source</label>
          <input id="source" placeholder="system name or id64" />
          <div id="src-suggestions" class="suggestions"></div>
        </div>
        <div class="row" style="text-align: center;">
          <button id="reverse" title="Swap source and target">⇅ Reverse</button>
        </div>
        <div class="row">
          <label>Target</label>
          <input id="target" placeholder="system name or id64" />
          <div id="tgt-suggestions" class="suggestions"></div>
        </div>
        <div class="row small">
          <label>Max hop</label>
          <input id="max-hop" type="number" value="400" />
        </div>
        <div class="row small">
          <label for="neutron-highway">Neutron Highway</label>
          <input id="neutron-highway" type="checkbox" />
        </div>
        <div class="row">
          <button id="find">Find path</button>
        </div>
      </div>

      <div class="controls" style="margin-top: 2em;">
        <h3>Find Nearest System</h3>
        <div class="row">
          <label>Near</label>
          <input id="near" placeholder="system name, id64, or x,y,z" />
          <div id="near-suggestions" class="suggestions"></div>
        </div>
        <div class="row">
          <label>Star types</label>
          <div class="star-selector">
            <div id="selected-chips" class="chips-list"></div>
            <input id="star-search" placeholder="Search star types..." autocomplete="off" />
            <div id="star-dropdown" class="star-dropdown hidden"></div>
          </div>
        </div>
        <div class="row" style="margin-top: -8px;">
          <label></label>
          <div class="presets-row">
            <button id="preset-kgbfoam" class="preset-btn">KGB FOAM</button>
            <button id="preset-neutron" class="preset-btn">Neutron/WD</button>
            <button id="preset-exotic" class="preset-btn">Exotic</button>
            <button id="clear-types" class="preset-btn" style="color: #b91c1c;">Clear</button>
          </div>
        </div>
        <div class="row">
          <button id="find-nearest">Find nearest</button>
        </div>
      </div>

      <section id="results">
        <h2>Results</h2>
        <div id="search-progress" class="progress-container hidden" style="margin-bottom: 1em;"><div class="progress-bar indeterminate"></div></div>
        <div id="info"></div>
        <div id="save-container" style="display: none; margin-bottom: 1em;">
          <button id="save-route">💾 Save this route</button>
        </div>
        <ol id="path-list"></ol>
      </section>

      <div class="controls" style="margin-top: 2em;">
        <h3>Saved Routes</h3>
        <div class="row">
          <select id="saved-routes-list">
            <option value="">-- No saved routes --</option>
          </select>
        </div>
        <div class="row">
          <button id="load-route">📂 Load</button>
          <button id="export-route">📤 Export</button>
          <button id="import-btn">📥 Import</button>
          <input type="file" id="import-file" style="display:none" accept=".json" />
          <button id="delete-route" style="background-color: #722;">🗑 Delete</button>
        </div>
      </div>
    </main>
    <footer>Flask + SPA demo</footer>
  </div>
  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
